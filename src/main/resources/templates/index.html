<!DOCTYPE html>
<html xmlns:th="http://www.thymeleaf.org"
	th:replace="~{common/layout_5block_index :: layout(~{::title},~{::body/content()})}">

<head>
	<title th:text="#{top}+' | '+ #{shop.title}"> </title>
	<meta charset="UTF-8" />

<body class="index_origin">
	<!--トップ写真-->
	<div class="top_page">
		<div class="top_page_consept_1">
			<div class="top_page_consept">
				<p class="top_page_mini">2026 Spring Makeup Collection</p>
				<div class="top_page_1">
					<p>Make everyday</p>
					<h2><span class="hero-title-main">Petal veil<br>for airy skin</span></h2>
				</div>
				<div class="top_page_2">
					<h3>肌に溶ける淡い色、光だけを残すような艶<br>
						花びらの気配をそっとまとう、春限定のメイクアップコレクション</h3>
				</div>
			</div>
			<div class="hover_button">
				<div class="top_page_consept_button">
					<a class="button_a button-ghost" href="#concept">Read concept</a>
				</div>
				<div class="top_page_consept_button_a">
					<a class="button_a button-ghost_a" href="#product" th:text="#{product.list}">Product List</a>
				</div>
			</div>
		</div>
		<img class="top_photo" th:src="@{/images/image_top_photo.jpg}" alt="トップ写真">
	</div>


	<!--ブランドコンセプト-->
	<section class="brand_concept" id="concept">
		<div class="brand_concept_char">
			<p class="brand_concept_char_p">Sheer &amp; luminous</p>
			<div class="brand_concept_char_mozi">
				<h2>Brand Concept</h2>
				<h3>日常のラグジュアリー</h3>
			</div>
			<div class="brand_concept_char_mozi2">
				<p>厳選された素材と洗練された色彩が<br>あなたの個性にそっと寄り添います</h3>
<!--				<h3>鏡に向き合う時間が、もっと愛おしく<br>誇らしくなるように</h3>-->
			</div>
		</div>
		<div class="brand_concept_photo">
			<img class="brand_concept_photo_1" th:src="@{/images/top_image_two_1.jpg}" alt="コンセプト写真">
		</div>
	</section>

	<!--カテゴリ-->
	<div id="product">
		<h1 class="category_tittle">Category</h1>
	</div>
	<div class="category_one">
		<div th:each="category: ${categories}" class="category_list">
			<a th:href="@{/client/item/list/category/{categoryId}(categoryId=${category.id})}"
				th:value="${category.id}">
				<img th:src="@{/images/top/category/top_image_{imgName}.jpg(imgName=${category.id})}">
			</a>
			<span class="category_name" th:text="${category.name}"></span>
		</div>
	</div>

	<div>
		<h2 class="title">
			<span th:if="${sortType==1}" th:text="#{sort.latest.title}"></span>
			<span th:if="${sortType==2 || sortType==null}" th:text="#{sort.hotsell.title}"></span>
		</h2>
	</div>
	<div th:if="${#lists.isEmpty(items)}">
		<p th:text="#{msg.client.item.list.none}"></p>
	</div>
	<div class="item_list">
		<th:block th:each="item, status: ${items}" th:if="${status.count le 10}">
			<!--			/* 1件分の商品情報 */-->
			<div class="item">
				<div class="item_name" th:text="${item.name}"></div>
				<a th:href="@{/client/item/detail/}+${item.id}">
					<img th:src="@{/images/photo/{imgName}(imgName=${item.image})}" th:if="${item.image != null}" />
					<img th:src="@{/images/common/no_image.jpg}" th:if="${item.image == null}" />
				</a>
			</div>
		</th:block>>
	</div>

	<!--おすすめ-->
	<div>
		<h2 class="title">
			<span th:text="#{sort.recommend.title}"></span>
		</h2>
	</div>
	<!--	<div th:if="${#lists.isEmpty(histories)}">-->
	<!--		<p th:text="#{msg.client.item.list.none}"></p>-->
	<!--	</div>-->
	<div class="item_list">
		<th:block th:each="recommend, status: ${recommends}" th:if="${status.count le 4}">
			<!--/* 1件分の商品情報 */-->
			<div class="item">
				<div class="item_name" th:text="${recommend.item.name}"></div>
				<a th:href="@{/client/item/detail/}+${recommend.item.id}">

					<img th:src="@{/images/photo/{imgName}(imgName=${recommend.item.image})}"
						th:if="${recommend.item.image != null}" />"


					<img th:src="@{/images/common/no_image.jpg}" th:if="${recommend.item.image == null}" />
				</a>
			</div>
		</th:block>
	</div>

	<!--閲覧履歴-->
	<div>
		<h2 class="title">
			<span th:text="#{sort.history.title}"></span>
		</h2>
	</div>
	<div th:if="${#lists.isEmpty(histories)}">
		<p th:text="#{msg.client.item.list.none}"></p>
	</div>
	<div class="item_list">
		<th:block th:each="itemHistories, status: ${histories}" th:if="${status.count le 4}">
			<!--/* 1件分の商品情報 */-->
			<div class="item">
				<div class="item_name" th:text="${itemHistories.item.name}"></div>
				<a th:href="@{/client/item/detail/}+${itemHistories.item.id}">

					<img th:src="@{/images/photo/{imgName}(imgName=${itemHistories.item.image})}"
						th:if="${itemHistories.item.image != null}" />"


					<img th:src="@{/images/common/no_image.jpg}" th:if="${itemHistories.item.image == null}" />
				</a>
			</div>
		</th:block>
	</div>
