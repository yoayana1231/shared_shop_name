<!DOCTYPE html>
<html xmlns:th="http://www.thymeleaf.org"
	th:replace="~{common/layout_5block :: layout(~{::title},~{::body/content()})}">

<head>
	<title th:text="#{user}+#{title.input.new}+' | '+ #{shop.title}"> </title>
	<meta charset="UTF-8" />
</head>

<body>
	<section class="user-regist-page">
		<div class="user-regist-bg user-regist-bg--blue" aria-hidden="true"></div>
		<div class="user-regist-bg user-regist-bg--pink" aria-hidden="true"></div>

		<div class="user-regist-shell">
			<aside class="user-regist-visual" aria-label="Cry Baby member registration concept">
				<div class="user-regist-visual__image"></div>
				<div class="user-regist-visual__content">
					<p class="user-regist-eyebrow">CREATE ACCOUNT</p>
					<h2>新しい、<br />わたしに出会う。</h2>
					<p class="user-regist-copy">Cry Babyの会員登録で、毎日のお買い物をもっと心地よく。</p>
				</div>
			</aside>

			<div class="user-regist-card">
				<div class="user-regist-card__head">
					<p class="user-regist-label">MEMBER REGISTRATION</p>
					<h2 th:text="#{user}+#{title.input.new}">会員新規登録</h2>
					<p th:text="#{msg.regist.input}">登録する情報を入力してください。</p>
				</div>

				<form th:action="@{/client/user/regist/check}" method="post" class="user_info_form user-regist-form"
					th:object="${userForm}">
					<th:block th:if="${#fields.hasErrors()}">
						<ul class="error_list user-regist-error">
							<li th:each="err:${#fields.detailedErrors()}" th:text="${err.message}"></li>
						</ul>
					</th:block>

					<ul class="input_list user-regist-inputs">
						<li>
							<label>
								<span class="input_title">[[#{userForm.email}]]</span>
								<span class="user-regist-required">必須</span>
							</label>
							<input type="text" th:field="*{email}" placeholder="例）example@crybaby.com" />
						</li>
						<li>
							<label>
								<span class="input_title">[[#{userForm.password}]]</span>
								<span class="user-regist-required">必須</span>
							</label>
							<input type="password" th:field="*{password}" placeholder="半角英数字8文字以上" />
						</li>
						<li>
							<label>
								<span class="input_title">[[#{userForm.name}]]</span>
								<span class="user-regist-required">必須</span>
							</label>
							<input type="text" th:field="*{name}" placeholder="例）山田 花子" />
						</li>
						<li>
							<label>
								<span class="input_title">[[#{userForm.postalCode}]]</span>
								<span class="user-regist-required">必須</span>
							</label>
							<input type="text" th:field="*{postalCode}" placeholder="例）1500001（ハイフンなし）" />
						</li>
						<li>
							<label>
								<span class="input_title">[[#{userForm.address}]]</span>
								<span class="user-regist-required">必須</span>
							</label>
							<textarea rows="4" th:field="*{address}"
								placeholder="例）東京都渋谷区神宮前1-1-1 Cry Babyマンション101"></textarea>
						</li>
						<li>
							<label>
								<span class="input_title">[[#{userForm.phoneNumber}]]</span>
								<span class="user-regist-required">必須</span>
							</label>
							<input type="text" th:field="*{phoneNumber}" placeholder="例）09012345678（ハイフンなし）" />
						</li>
					</ul>

					<input type="hidden" name="authority" value="2" />

					<div class="user-regist-actions">
						<input type="submit" value="確認する" th:class="send_button" />
					</div>
				</form>

				<div class="user-regist-sub-actions">
					<form th:action="@{/}" method="post" class="user-regist-back-form">
						<input type="submit" value="トップへ戻る" class="back_button" />
					</form>

				</div>
			</div>
		</div>
	</section>
</body>

</html>
