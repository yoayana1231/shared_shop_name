<!DOCTYPE html>
<html xmlns:th="http://www.thymeleaf.org"
	th:replace="~{common/layout_5block :: layout(~{::title},~{::body/content()})}">

<head>
	<title th:text="#{user}+#{title.input.complete}+' | '+ #{shop.title}"> </title>
	<meta charset="UTF-8" />
</head>

<body>
	<section class="user-regist-page user-regist-page--complete">
		<div class="user-regist-bg user-regist-bg--blue" aria-hidden="true"></div>
		<div class="user-regist-bg user-regist-bg--pink" aria-hidden="true"></div>

		<div class="user-regist-complete-card">
			<p class="user-regist-label">WELCOME TO CRY BABY</p>
			<h2 th:text="#{user}+#{title.input.complete}">会員登録完了</h2>
			<p class="complete_message" th:text="#{user}+#{msg.regist.complete}">会員情報の登録が完了しました。</p>
			<a class="user-regist-complete-link" th:href="@{/}" th:text="#{msg.back.to.top}">トップへ戻る</a>
		</div>
	</section>
</body>

</html>
