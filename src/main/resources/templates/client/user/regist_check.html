<!DOCTYPE html>
<html xmlns:th="http://www.thymeleaf.org"
	th:replace="~{common/layout_5block :: layout(~{::title},~{::body/content()})}">

<head>
	<title th:text="#{user}+#{title.input.check}+' | '+ #{shop.title}"> </title>
	<meta charset="UTF-8" />
</head>

<body>
	<section class="user-regist-page user-regist-page--check">
		<div class="user-regist-bg user-regist-bg--blue" aria-hidden="true"></div>
		<div class="user-regist-bg user-regist-bg--pink" aria-hidden="true"></div>

		<div class="user-regist-shell">
			<aside class="user-regist-visual" aria-label="Cry Baby member registration concept">
				<div class="user-regist-visual__image"></div>
				<div class="user-regist-visual__content">
					<p class="user-regist-eyebrow">CONFIRM ACCOUNT</p>
					<h2>入力内容を<br />ご確認ください。</h2>
					<p class="user-regist-copy">内容に間違いがなければ、登録ボタンから会員登録を完了してください。</p>
				</div>
			</aside>

			<div class="user-regist-card">
				<div class="user-regist-card__head">
					<p class="user-regist-label">MEMBER REGISTRATION</p>
					<h2 th:text="#{user}+#{title.input.check}">会員登録確認</h2>
					<p th:text="#{msg.regist.check}">以下の内容で登録します。</p>
				</div>

				<ul class="input_list user-regist-confirm-list" th:object="${userForm}">
					<li>
						<span class="input_title">[[#{userForm.email}]]</span>
						<span class="input_value" th:text="*{email}"></span>
					</li>
					<li>
						<span class="input_title">[[#{userForm.password}]]</span>
						<span class="input_value">********</span>
					</li>
					<li>
						<span class="input_title">[[#{userForm.name}]]</span>
						<span class="input_value" th:text="*{name}"></span>
					</li>
					<li>
						<span class="input_title">[[#{userForm.postalCode}]]</span>
						<span class="input_value" th:text="*{postalCode}"></span>
					</li>
					<li>
						<span class="input_title">[[#{userForm.address}]]</span>
						<span class="input_value" th:text="*{address}"></span>
					</li>
					<li>
						<span class="input_title">[[#{userForm.phoneNumber}]]</span>
						<span class="input_value" th:text="*{phoneNumber}"></span>
					</li>
				</ul>

				<div class="user-regist-confirm-actions">
					<form th:action="@{/client/user/regist/complete}" method="post" class="user_info_form">
						<input type="submit" value="登録する" class="send_button" />
					</form>
					<form th:action="@{/client/user/regist/input}" method="post" class="update">
						<input type="submit" value="修正する" class="back_button" />
					</form>
				</div>
			</div>
		</div>
	</section>
</body>

</html>
