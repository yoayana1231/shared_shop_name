<!DOCTYPE html>
<html xmlns:th="http://www.thymeleaf.org"
	th:replace="~{common/layout_5block :: layout(~{::title},~{::body/content()})}">

<head>
	<title th:text="#{user}+#{title.quit.complete}+' | '+ #{shop.title}"> </title>
	<meta charset="UTF-8" />
</head>

<body>
	<section class="user-regist-page user-regist-page--complete user-account-page user-account-page--delete-complete">
		<div class="user-regist-bg user-regist-bg--blue" aria-hidden="true"></div>
		<div class="user-regist-bg user-regist-bg--pink" aria-hidden="true"></div>

		<div class="user-regist-complete-card user-account-complete-card user-account-complete-card--delete">
			<p class="user-regist-label">ACCOUNT CLOSED</p>
			<h2 th:text="#{user}+#{title.quit.complete}">会員退会完了</h2>
			<p class="complete_message" th:text="#{msg.client.delete.complete}">退会が完了しました。</p>
			<a class="user-regist-complete-link" th:unless="${designMode}" th:href="@{/}" th:text="#{msg.back.to.top}">トップへ戻る</a>
		</div>
	</section>
</body>

</html>
