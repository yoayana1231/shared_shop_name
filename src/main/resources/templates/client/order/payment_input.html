<!DOCTYPE html>
<html xmlns:th="http://www.thymeleaf.org"
	th:replace="~{common/layout_5block :: layout(~{::title},~{::body/content()})}">

<head>
	<script th:src="@{/js/payment_input.js}" type="text/javascript"></script>
	<title th:text="#{title.order.payment.input}+' | '+ #{shop.title}"> </title>
	<meta charset="UTF-8" />
</head>

<body class="user order_payment_input" id="page-input">

	<!--タイムライン-->
	<nav class="step-timeline">
		<ul class="step-list">
			<li class="step-item step-cart">
				<span class="step-icon">1</span>
				<span class="step-label">情報入力</span>
			</li>
			<li class="step-item step-input">
				<span class="step-icon">2</span>
				<span class="step-label">支払方法選択</span>
			</li>
			<li class="step-item step-confirm">
				<span class="step-icon">3</span>
				<span class="step-label">ご注文確認</span>
			</li>
			<li class="step-item step-complete">
				<span class="step-icon">4</span>
				<span class="step-label">注文完了</span>
			</li>
		</ul>
	</nav>

	<!--YOUR CART-->
	<h2 th:class="your_cart" th:text="#{title.order.address.input}"></h2>
	<!--お支払い方法選択-->
	<h2 th:class="pay_mozi" th:text="#{title.order.payment.input}"></h2>
	<!--お支払い方法を選択してください-->
	<p th:class="input_message_a" th:text="#{msg.order.payment.input}"></p>

	<div class="user_info_form_area">
		<form th:action="@{/client/order/check}" method="post">
			<ul class="payment_method_select_a">
				<li>
					<label class="radio_label">
						<input type="radio" name="payMethod" value="1" th:if="${payMethod == 1}" checked="checked"
							onclick=" payChange();" />
						<input type="radio" name="payMethod" value="1"
							th:unless="${payMethod == 1}" />[[#{paymethod.credit.str}]]
					</label>
				</li>
				<li>
					<label class="radio_label">
						<input type="radio" name="payMethod" value="2" th:if="${payMethod == 2}" checked="checked"
							onclick=" payChange();" />
						<input type="radio" name="payMethod" value="2"
							th:unless="${payMethod == 2}" />[[#{paymethod.bank.str}]]
					</label>
				</li>
				<li>
					<label class="radio_label">
						<input type="radio" name="payMethod" value="3" th:if="${payMethod  == 3}" checked="checked"
							onclick=" payChange();" />
						<input type="radio" name="payMethod" value="3"
							th:unless="${payMethod  == 3}" />[[#{paymethod.onarrival.str}]]
					</label>
				</li>
				<li>
					<label class="radio_label">
						<input type="radio" name="payMethod" value="4" th:if="${payMethod == 4}" checked="checked"
							onclick=" payChange();" />
						<input type="radio" name="payMethod" value="4"
							th:unless="${payMethod == 4}" />[[#{paymethod.emoney.str}]]
					</label>
				</li>
				<li>
					<label class="radio_label">
						<input type="radio" name="payMethod" value="5" th:if="${payMethod == 5}" checked="checked"
							onclick=" payChange();" />
						<input type="radio" name="payMethod" value="5"
							th:unless="${payMethod == 5}" />[[#{paymethod.convenience.str}]]
					</label>
				</li>
			</ul>

<!--		<form th:action="@{/client/order/payment/back}" method="post" class="update">-->
			<input type="submit" class="back_button_a" value="戻る" th:formaction="@{/client/order/payment/back}" formmethod="post" formnovalidate/>
			<input type="submit" class="send_button_a" value="次へ" />

		</form>
	</div>
	</div>
</body>

</html>
