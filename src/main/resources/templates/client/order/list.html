<!DOCTYPE html>
<html xmlns:th="http://www.thymeleaf.org"
	th:replace="~{common/layout_5block :: layout(~{::title},~{::body/content()})}">

<head>
	<title th:text="#{order}+#{title.list}+' | '+ #{shop.title}"> </title>
	<meta charset="UTF-8" />
</head>

<body class="user order_list">
	<div class="orders-page">

		<th:block th:if="${error}">
			<div class="error_msg_order-list" th:text="${error}"></div>
		</th:block>

		<th:block th:if="${#lists.isEmpty(orders)}">
			<section class="favorite-empty order-empty">
				<p class="favorite-empty__eyebrow">MY ORDERS</p>
				<h1 th:text="#{msg.client.order.list.none}">ご注文履歴はありません</h1>
				<p class="favorite-empty__text">
					お買い物をすると、こちらにご注文履歴が表示されます。<br>
					気になるアイテムを探してみましょう。
				</p>
				<a th:href="@{/client/item/list/1}" class="favorite-empty__btn">商品を探す</a>
			</section>
		</th:block>

		<th:block th:unless="${#lists.isEmpty(orders)}">
			<div class="orders-shell">
				<aside class="orders-aside">
					<p class="orders-aside__script">Make every day yours. ♡</p>
					<p>&nbsp;</p>
					<h class="aside_top_text">わたしらしい<br>毎日を、やさしく彩る。</h2>
						<p class="orders-aside__lead">
						<p>&nbsp;
						<p>
						<h2>新しい私と出会う、<br>はじまりの一歩。</h2>
						<br>
						<br>
						</p>
						<div class="orders-aside__line"></div>
						<div class="orders-aside__visual" aria-hidden="true"></div>
				</aside>

				<section class="orders-content">

					<div class="orders-heading">
						<div class="orders-heading__copy">
							<h1>MY ORDERS</h1>
							<p>ご注文履歴</p>
							<span class="orders-heading__accent"></span>
						</div>
					</div>

					<div class="orders-list">
						<article class="order-card" th:each="order : ${orders}">
							<div class="order-card__grid">
								<div class="order-card__item order-card__item--number">
									<span class="order-card__label">注文番号</span>
									<a th:href="@{/client/order/detail/{id}(id=${order.id})}"
										class="order-card__value order-card__value--number">
										#<span th:text="${order.id}">1001</span>
									</a>
								</div>

								<div class="order-card__item">
									<span class="order-card__label" th:text="#{data.client.order.date}">注文日</span>
									<span class="order-card__value"
										th:text="${#strings.replace(#strings.substring(order.insertDate, 0, 10), '-', '/')}"></span>
								</div>

								<div class="order-card__item">
									<span class="order-card__label" th:text="#{paymethod.str}">支払方法</span>
									<span class="order-card__value" th:switch="${order.payMethod}">
										<span th:case="1" th:text="#{paymethod.credit.str}">クレジットカード</span>
										<span th:case="2" th:text="#{paymethod.bank.str}">銀行振込</span>
										<span th:case="3" th:text="#{paymethod.onarrival.str}">代引き</span>
										<span th:case="4" th:text="#{paymethod.emoney.str}">電子マネー</span>
										<span th:case="5" th:text="#{paymethod.convenience.str}">コンビニ決済</span>
									</span>
								</div>

								<div class="order-card__item">
									<span class="order-card__label" th:text="#{data.total.price}">合計金額</span>
									<span class="order-card__value order-card__value--total">
										¥<span
											th:text="${#numbers.formatInteger(order.total, 1, 'COMMA')}">12,540</span>
									</span>
									<span class="order-card__sub">（税込）</span>
								</div>

								<div class="order-card__action">
									<a th:href="@{/client/order/detail/{id}(id=${order.id})}"
										class="order-card__button">詳細を見る</a>
								</div>
							</div>
						</article>
					</div>
				</section>
			</div>
		</th:block>
	</div>
</body>

</html>
