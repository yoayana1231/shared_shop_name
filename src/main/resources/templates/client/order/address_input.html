<!DOCTYPE html>
<html xmlns:th="http://www.thymeleaf.org"
	th:replace="~{common/layout_5block :: layout(~{::title},~{::body/content()})}">

<head>
	<title th:text="#{title.order.address.input}+' | '+ #{shop.title}">注文情報入力</title>
	<meta charset="UTF-8" />
</head>

<body>
	<div class="order-flow order-flow--address" id="page-order-address">
		<section class="order-editorial-head" aria-labelledby="order-address-title">
			<p class="order-kicker">CHECKOUT FLOW</p>
			<div class="order-title-row">
				<span class="order-screen-no">01</span>
				<div>
					<h2 id="order-address-title" class="order-page-title" th:text="#{title.order.address.input}">注文情報入力</h2>
					<p class="order-page-lead">お届け先の情報をご入力ください。</p>
				</div>
			</div>
		</section>

		<nav class="step-timeline" aria-label="注文ステップ">
			<ul class="step-list">
				<li class="step-item step-address">
					<span class="step-icon">1</span>
					<span class="step-label">情報入力</span>
				</li>
				<li class="step-item step-payment">
					<span class="step-icon">2</span>
					<span class="step-label">支払方法選択</span>
				</li>
				<li class="step-item step-confirm">
					<span class="step-icon">3</span>
					<span class="step-label">ご注文確認</span>
				</li>
				<li class="step-item step-complete">
					<span class="step-icon">4</span>
					<span class="step-label">注文完了</span>
				</li>
			</ul>
		</nav>

		<div class="order-shell">
			<div class="order-shell__ornament" aria-hidden="true"></div>

			<div class="order-input-layout">
				<form class="order-card order-card--form address-form-card" th:action="@{/client/order/payment/input}" method="post" th:object="${orderForm}">
					<th:block th:if="${#fields.hasErrors()}">
						<ul class="error-list">
							<li th:each="err:${#fields.detailedErrors()}" th:text="${err.message}"></li>
						</ul>
					</th:block>

					<div class="order-section-head">
						<span class="order-section-no">Delivery</span>
						<h3>お届け先情報の入力</h3>
						<p th:text="#{msg.order.address.input}">お届け先の情報をご入力ください。</p>
					</div>

					<ul class="order-form-list">
						<li class="order-form-row">
							<label for="name"><span class="order-form-label">[[#{orderForm.name}]]</span><span class="required-badge">必須</span></label>
							<input id="name" type="text" th:field="*{name}" placeholder="山田 花子" />
						</li>
						<li class="order-form-row">
							<label for="phoneNumber"><span class="order-form-label">[[#{orderForm.phoneNumber}]]</span><span class="required-badge">必須</span></label>
							<input id="phoneNumber" type="text" th:field="*{phoneNumber}" placeholder="09012345678" />
						</li>
						<li class="order-form-row order-form-row--zip">
							<label for="postalCode"><span class="order-form-label">[[#{orderForm.postalCode}]]</span><span class="required-badge">必須</span></label>
							<div class="zip-input-wrap">
								<input id="postalCode" type="text" th:field="*{postalCode}" placeholder="1500001" />
							</div>
						</li>
						<li class="order-form-row">
							<label for="address"><span class="order-form-label">[[#{orderForm.address}]]</span><span class="required-badge">必須</span></label>
							<textarea id="address" rows="5" th:field="*{address}" placeholder="東京都渋谷区神宮前1-2-3 ○○マンション101号室"></textarea>
						</li>
					</ul>

					<input type="hidden" th:field="*{id}" />
					<input type="hidden" th:field="*{payMethod}" />

					<p class="order-helper-note">※ ご登録の住所にお届けします。内容をご確認のうえ次へお進みください。</p>

					<div class="order-actions">
						<button type="submit" class="order-btn order-btn--ghost" th:formaction="@{/client/basket/list}" formmethod="post" formnovalidate>戻る</button>
						<button type="submit" class="order-btn order-btn--primary">次へ<span aria-hidden="true">→</span></button>
					</div>
				</form>

				<aside class="order-card order-summary-card" aria-label="ご注文内容">
					<div class="summary-heading">
						<div>
							<span>ORDER SUMMARY</span>
							<h3>ご注文内容</h3>
						</div>
						<small>Review</small>
					</div>

					<div class="summary-items">
						<div class="summary-item" th:each="basket:${session.basket}">
							<div class="summary-thumb">
								<img th:src="@{/images/photo/{imgName}(imgName=${basket.image})}" th:if="${basket.image != null}" alt="" />
								<img th:src="@{/images/common/no_image.jpg}" th:if="${basket.image == null}" alt="" />
							</div>
							<div class="summary-text">
								<span class="summary-name" th:text="${basket.name}">商品名</span>
								<span class="summary-meta" th:text="'数量：' + ${basket.orderNum}">数量：1</span>
							</div>
							<span class="summary-price" th:text="'¥' + ${#numbers.formatInteger(basket.price, 1, 'COMMA')}">¥2,980</span>
						</div>
					</div>

					<div class="summary-total" th:if="${summaryTotal != null}">
						<span>ご請求予定額</span>
						<strong th:text="'¥' + ${#numbers.formatInteger(summaryTotal, 1, 'COMMA')}">¥0</strong>
					</div>

					<div class="summary-note">
						<span class="summary-note-icon">✦</span>
						<p>次の画面でお支払い方法を選択します。商品の発送予定はご注文確定後にお知らせします。</p>
					</div>
				</aside>
			</div>
		</div>
	</div>
</body>
</html>
