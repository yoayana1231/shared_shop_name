<!DOCTYPE html>
<html xmlns:th="http://www.thymeleaf.org"
	th:replace="~{common/layout_5block :: layout(~{::title},~{::body/content()})}">

<head>
	<title th:text="#{basket}+' | '+ #{shop.title}"> </title>
	<meta charset="UTF-8" />
</head>

<body class="user shopping_basket">
	<section class="cart-page">
		<div class="breadcrumb">HOME &gt; MY CART</div>

		<div class="cart-heading">
			<div>
				<h1>MY CART</h1>
				<p>ショッピングバッグ</p>
			</div>
			<span th:text="${itemListSize}+' ITEMS'">ITEMS</span>
		</div>

		<div th:if="${session.basketBeans == null}">
			<!--/* 買い物かごが空のとき */-->
			<p th:text="#{msg.basket.list.none}"></p>
		</div>

		<th:block th:if="${itemNameListLessThan != null || itemNameListZero != null}">
			<br />

			<!--/* 在庫不足商品 */-->
			<ul class="error_list_no_mark" th:if="${itemNameListLessThan != null}">
				<li th:each="err : ${itemNameListLessThan}" th:text="#{msg.basket.stock.short(${err})}"></li>

			</ul>
			<!--/* 在庫なし商品 */-->
			<ul class="error_list_no_mark" th:if="${itemNameListZero != null}">
				<li th:each="err : ${itemNameListZero}" th:text="#{msg.basket.stock.none(${err})}">
				</li>
			</ul>
			<br />
		</th:block>

		<th:block th:if="${session.basketBeans != null}">
			<div class="cart-layout">
				<section class="cart-list" aria-label="cart items">
					<article class="cart-item" th:each="item,status: ${session.basketBeans}">
						<div class="item-number"></div>
						<div class="item-image">
							<img th:src="@{/images/photo/{image}(image=${itemList[status.index].image})}"
								th:if="${itemList[status.index].image != null}" />
						</div>
						<div class="item-info">
							<p class="category" th:text="${itemList[status.index].category.name}"></p>
							<h2><a th:href="@{/client/item/detail/{id}(id=${item.id})}" th:text="${item.name}"></a></h2>
							<p class="price" th:text="${itemList[status.index].price}"><small>税込</small></p>
						</div>
						<div class="quantity-box" aria-label="quantity">
							<span>数量</span>
							<div class="counter">
								<form th:action="@{/client/basket/delete/calc}" method="post">
									<input type="hidden" name="id" th:value="${item.id}" />
									<input type="hidden" name="dec" value="-1" />
									<button type="submit">−</button>
								</form>
								<b th:text="${item.orderNum}"></b>
								<form th:action="@{/client/basket/add/calc}" method="post">
									<input type="hidden" name="id" th:value="${item.id}" />
									<input type="hidden" name="inc" value="+1" />
									<button type="submit">＋</button>
								</form>

							</div>
						</div>
						<div class="item-actions">
							<form th:action="@{/client/basket/itemdelete}" method="post">
								<input type="hidden" name="id" th:value="${item.id}" />
								<input type="hidden" name="mode" value="delete" />
								<button type="submit">削除</button>
							</form>

							<!--							お気に入りボタン-->

							<div class="favorite_button_a">
								<form th:action="@{/client/favorite/update}" method="post">
									<input type="hidden" name="itemId" th:value="${item.id}">
									<button type="submit"
										th:if="${favoriteItemIds != null && favoriteItemIds.contains(item.id)}">
										<!--お気に入り登録中-->
										<!--画像を人型に変えてるのでなんかいい感じにしてください-->
										<img th:src="@{/images/header/person.svg}">
									</button>

									<button type="submit"
										th:unless="${favoriteItemIds != null && favoriteItemIds.contains(item.id)}">
										<img th:src="@{/images/faviorite_blank.svg}">
									</button>
								</form>
							</div>
							<!--							<p th:if="${item.stock == 0}" th:text="#{data.out.of.stock}"></p>-->
							<!--							<p th:if="${item.stock > 5}" th:text="#{data.in.stock}"></p>-->
							<!--							<p th:if="${item.stock >= 1 and 5 >= item.stock }" th:text="${item.stock}"></p>-->

						</div>
					</article>

					<a th:href="@{/client/item/list/1}" class="continue-btn">ショッピングを続ける 〈</a>
					<form th:action="@{/client/basket/allDelete}" method="post">
						<input type="submit" value="買い物かごを空にする" class="delete_button" />
					</form>
				</section>
				<aside class="summary-card" aria-label="order summary">
					<h2>ORDER SUMMARY</h2>
					<p class="summary-sub">ご注文内容</p>
					<!--				動的に実装していない-->
					<dl class="summary-list">
						<!--						<div>-->
						<!--							<dt>小計</dt>-->
						<!--							<dd>¥6,270</dd>-->
						<!--						</div>-->
						<!--						<div>-->
						<!--							<dt>送料</dt>-->
						<!--							<dd>¥550</dd>-->
						<!--						</div>-->
						<div class="total">
							<dt>合計（税込）</dt>
							<dd th:text="${total}"></dd>
						</div>
					</dl>

					<form th:action="@{/client/order/address/input}" method="post">
						<button class="checkout-btn">ご購入手続きへ進む</button>
					</form>
					<p class="terms">
						ご購入手続きへ進むと、利用規約に同意したものとみなします。
					</p>
				</aside>
			</div>
		</th:block>

		<!--		ここからおすすめ商品（閲覧履歴）-->

		<section class="recommend-band">
			<div class="recommend-copy">
				<h2>EDITOR’S<br />RECOMMEND</h2>
				<p>こちらもおすすめ</p>
			</div>
			<div class="recommend-items">
				<div th:each="recommend, status: ${recommends}" th:if="${status.count le 4}">
					<!--/* 1件分の商品情報 */-->
					<div>
						<a th:href="@{/client/item/detail/}+${recommend.item.id}">

							<img th:src="@{/images/photo/{imgName}(imgName=${recommend.item.image})}"
								th:if="${recommend.item.image != null}" />


							<img th:src="@{/images/common/no_image.jpg}" th:if="${recommend.item.image == null}" />
						</a>

					</div>
					<div>
						<span th:text="${recommend.item.category.name}"></span>
						<span th:text="${recommend.item.name}"></span>
						<span th:text="${recommend.item.price}"></span>

					</div>
					<div>
						<form th:action="@{/client/favorite/update}" method="post">
							<input type="hidden" name="itemId" th:value="${recommend.item.id}">
							<button type="submit"
								th:if="${favoriteItemIds != null && favoriteItemIds.contains(recommend.item.id)}">
								<!--お気に入り登録中-->
								<!--画像を人型に変えてるのでなんかいい感じにしてください-->
								<img th:src="@{/images/header/person.svg}">
							</button>

							<button type="submit"
								th:unless="${favoriteItemIds != null && favoriteItemIds.contains(recommend.item.id)}">
								<img th:src="@{/images/faviorite_blank.svg}">
							</button>
						</form>
					</div>

				</div>

			</div>
		</section>
