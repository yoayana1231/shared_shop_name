<!DOCTYPE html>
<html xmlns:th="http://www.thymeleaf.org"
	th:replace="~{common/layout_5block :: layout(~{::title},~{::body/content()})}">

<head>
	<meta charset="UTF-8">
	<title th:text="#{title.review.input}+' | '+ #{shop.title}"></title>
</head>

<body class="user">

	<!--	<h2 th:class="title" th:text="#{review}+#{input.title.action}"></h2>-->
	<div class="review_form">
		<form id="reviewForm" th:action="@{/client/review/check}" method="post" th:object="${reviewForm}">

			<!--エラーメッセージ-->
			<p class="error_msg_review">
				<span th:each="err: ${#fields.detailedErrors()}">
					<span th:text="${err.message}"></span><br>
				</span>
			</p>
			
			

			<!--評価-->

			<div>
				<div class="review_input_form">
					<div><input type="hidden" th:field="*{id}"></div>
					<div><input type="hidden" th:field="*{item.id}"></div>
					
					<div th:text="*{item.name}"></div>

					<div class="review_radio">
						<div class="review_te">
							<p class="select_review">評価を選択</p>
							<span class="must">必須</span>
						</div>
						<div class="line_brown"></div>
						<div class="stars_input">

							<input id="star-5" type="radio" th:field="*{rating}" value="5" name="stars"><br>
							<label class="stars star-5" for="star-5"></label>

							<input id="star-4" type="radio" th:field="*{rating}" value="4" name="stars"><br>
							<label class="stars star-4" for="star-4"></label>

							<input id="star-3" type="radio" th:field="*{rating}" value="3" name="stars"><br>
							<label class="stars star-3" for="star-3"></label>

							<input id="star-2" type="radio" th:field="*{rating}" value="2" name="stars"><br>
							<label class="stars star-2" for="star-2"></label>

							<input id="star-1" type="radio" th:field="*{rating}" value="1" name="stars"><br>
							<label class="stars star-1" for="star-1"></label>

						</div>
            
					</div>

					<!--レビュー記入欄-->

					<div class="review_input">
						<div class="review_te">
							<p class="select_review">レビューの入力</p>
							<span class="must">必須</span>
						</div>
						<div class="line_brown"></div>



						<textarea th:field="*{comments}" cols="30" rows="5"></textarea><br>
					</div>
				</div>
				<!--				<div class="send_button">-->
				<!--					<input type="submit" value="確認" class="send_button_go_check_review" />-->
				<!--				</div>-->

			</div>
		</form>
		<div class="button_area">

			<form th:action="@{/client/item/detail/{id}(id=${reviewForm.item.id})}" method="get">
				<input type="submit" value="戻る" class="back_button_review_input" />
			</form>

			<input type="submit" value="確認" class="send_button_go_check_review" form="reviewForm" />

		</div>

		<!--		</form>-->
	</div>
