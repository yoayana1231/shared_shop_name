<!DOCTYPE html>
<html xmlns:th="http://www.thymeleaf.org"
	th:replace="~{common/layout_5block :: layout(~{::title},~{::body/content()})}">

<head>
	<title th:text="#{item}+#{title.detail}+' | '+ #{shop.title}"> </title>
	<meta charset="UTF-8" />
</head>

<body class="user">

	<!--	<h2 th:class="title" th:text="#{item}+#{title.detail}"></h2>-->


	<div class="all_detail" th:object="${item}">
		<div class="item_detail_area">
			<div class="item_img">
				<img th:src="@{/images/photo/{imgName}(imgName=${item.image})}" th:if="${item.image != null}" />
				<img th:src="@{/images/common/no_image.jpg}" th:if="${item.image == null}" />
			</div>
			<div class="item_cart">
				<div class="item_detail">
					<!--						<dt>[[#{data.item.name}]]</dt>-->
					<p class="category_name" th:text="*{categoryName}"></p>
					<h2 class="detail_name" th:text="*{name}"></h2>
					<!--						<dt>[[#{data.item.price}]]</dt>-->
					<div class="price_only">
						<p class="price_tax" th:text="'&yen;'+*{price}"></p>
						<span class="tax">(税込)</span>
					</div>
					<!--						<dt>[[#{data.item.stock}]]</dt>-->
					<!--						<dt>[[#{data.category}]</dt>-->
					<!--						<dt>[[#{data.description}]]</dt>-->
					<div class="rating">
						<!--						動的に実装していない-->
						<span>★★★★★</span>
						<b>4.8</b>
						<a class="review_link" a href="#reviews"><span
								th:text="'レビューを見る（'+${reviewsSize}+'件）'"></span></a>
					</div>
					<p class="stock_item" th:if="*{stock > 5}" th:text="#{data.in.stock}"></p>
					<p class="stock_item" th:if="*{stock >= 1 and 5 >= stock }" th:text="*{stock}"></p>
					<p class="stock_item" th:if="*{stock == 0}" th:text="#{data.out.of.stock}"></p>
					<p class="script" th:text="*{description}"></p>
				</div>
				<div class="detail_button">
					<form th:action="@{/client/basket/add}" method="post" class="user_info_form" th:if="*{stock > 0}">
						<input type="hidden" th:field="*{id}" />
						<input type="submit" value="カートに入れる" class="send_button_detail" />
					</form>
					<form th:action="@{/client/favorite/update}" method="post">
						<input type="hidden" name="itemId" th:value="${item.id}" />
						<input type="submit" value="♡　お気に入りに追加" class="send_button_fav_detail" />
					</form>
					<form th:action="@{/client/review/input/{itemId}(itemId=${item.id})}" method="get"
						class="user_info_form">
						<input type="submit" value="レビューを書く" class="send_button_review" />
					</form>
				</div>
			</div>
		</div>
	</div>



	<!--					<div class="detail_button_area">-->

	<p class="no_review" th:text="#{msg.review.list.none}" th:if="${#lists.isEmpty(itemReviews)}"></p>
	<div class="review_and_button">
		<p class="review_text">REVIEW</p>
		<div>
			<form th:action="@{/client/review/input/{itemId}(itemId=${item.id})}" method="get" class="user_info_form">
				<input type="submit" value="レビューを書く" class="send_button_review" />
			</form>
			<form th:action="@{/client/item/list/1}" method="get">
				<input type="submit" value="戻る" class="back_button_detail" />
			</form>
		</div>
	</div>
	<div class="review" id="reviews">
		<div class="review_avg">
			<p class="rating_review" th:text="${#numbers.formatDecimal(averageRating, 1, 1)}"></p>
			<!--		動的に実装されてない-->

			<div th:if="${totalCount}!=null" class="star" th:text="${totalCount}+'件'">★★★★★</div>
		</div>
		<div class="review_all_calc">
			<!--		動的に実装されてない-->

			<ul>
				<li>★★★★★： <span th:text="${ratingCounts.get(5)}">0</span> 件</li>
				<li>★★★★☆： <span th:text="${ratingCounts.get(4)}">0</span> 件</li>
				<li>★★★☆☆： <span th:text="${ratingCounts.get(3)}">0</span> 件</li>
				<li>★★☆☆☆： <span th:text="${ratingCounts.get(2)}">0</span> 件</li>
				<li>★☆☆☆☆： <span th:text="${ratingCounts.get(1)}">0</span> 件</li>
			</ul>
		</div>
		<th:block th:if="!${#lists.isEmpty(itemReviews)}">
			<div class="review_comments" th:each="review: ${itemReviews}">
				<th:block th:switch="${review.rating}">
					<p class="star" th:case="1" th:text="'★☆☆☆☆'+'&nbsp;1'"></p>
					<p class="star" th:case="2" th:text="'★★☆☆☆'+'&nbsp;2'"></p>
					<p class="star" th:case="3" th:text="'★★★☆☆'+'&nbsp;3'"></p>
					<p class="star" th:case="4" th:text="'★★★★☆'+'&nbsp;4'"></p>
					<p class="star" th:case="5" th:text="'★★★★★'+'&nbsp;5'"></p>
				</th:block>
				<!--			<p th:text="#{rating}"></p>-->
				<p class="reviewer" th:text="${review.comments}"></p>
				<th:block th:if="${session.user != null && review.user.id == session.user.id}">
					<td>
						<form th:action="@{/client/review/edit/input/{reviewId}(reviewId=${review.id})}" method="get">
							<input type="hidden" th:value="${review.id}">
							<button type="submit" class="edit_button">編集</button>
						</form>
					</td>
					<td>
						<form th:action="@{/client/review/delete}" method="post">
							<input type="hidden" name="reviewId" th:value="${review.id}">
							<button type="submit" class="delete_button_detail">削除</button>
						</form>
					</td>
				</th:block>
			</div>
		</th:block>
		<!--		<form th:action="@{/client/item/list/1}" method="post">-->
		<!--			<input type="submit" value="戻る" class="back_button_detail" />-->
		<!--		</form>-->
	</div>
	<div class="bar_detail"></div>
	<section class="recommend-band">
		<div class="recommend-copy">
			<h2>EDITOR’S<br />RECOMMEND</h2>
			<p>こちらもおすすめ</p>
		</div>
		<div class="recommend-items">
			<div th:each="bestSelling, status: ${bestSelling}" th:if="${status.count le 4}">
				<!--/* 1件分の商品情報 */-->
				<div>
					<a th:href="@{/client/item/detail/}+${bestSelling.id}">

						<img th:src="@{/images/photo/{imgName}(imgName=${bestSelling.image})}"
							th:if="${bestSelling.image != null}" />


						<img th:src="@{/images/common/no_image.jpg}" th:if="${bestSelling.image == null}" />
					</a>
				</div>
				<div>
					<span th:text="${bestSelling.category.name}"></span>
					<span th:text="${bestSelling.name}"></span>
					<span th:text="${bestSelling.price}"></span>

				</div>
				<div>
					<form th:action="@{/client/favorite/update}" method="post">
						<input type="hidden" name="itemId" th:value="${bestSelling.id}">
						<button type="submit"><img th:src="@{/images/faviorite_blank.svg}"></button>
					</form>
				</div>

				<!--				<article>-->
				<!--					<img src="https://images.unsplash.com/photo-1592945403244-b3fbafd7f539?auto=format&fit=crop&w=350&q=85"-->

			</div>
	</section>
