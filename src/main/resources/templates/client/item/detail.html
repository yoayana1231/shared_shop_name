<!DOCTYPE html>

	<div class="all_detail" th:object="${item}">
		<div class="pic_item_cart_fav">
			<aside class="editorial-column_list">
				<div class="quote-card_list">
					<span class="quote-mark_list">“</span>
					<h3>ときめきは、<br />きっと毎日つくれる。</h3>
					<p>心がふっとほどけるような、お気に入りとの出会いを。</p>
				</div>
				<div class="ranking-card_list">
					<div class="mini-heading_list">
						<span>RANKING</span><small>人気アイテム</small>
					</div>
					<ol>
						<li>
							<img th:src="@{/images/photo/shopping.webp}" alt="" /><span>さおりっぷ<small>¥3500</small></span>
						</li>
						<li>
							<img th:src="@{/images/photo/shopping3.webp}"
								alt="" /><span>蜜ひとくち<small>¥3000</small></span>
						</li>
						<li>
							<img th:src="@{/images/photo/shopping4.webp}" alt="" /><span>恋つぼみ<small>¥3450</small></span>
						</li>
					</ol>
					<a th:href="@{/client/item/list/2(categoryId=${categoryId})}">人気アイテムをもっとみる →</a>
				</div>
			</aside>
			<div class="item_detail_area">
				<div class="item_img">
					<img th:src="@{/images/photo/{imgName}(imgName=${item.image})}" th:if="${item.image != null}" />
					<img th:src="@{/images/common/no_image.jpg}" th:if="${item.image == null}" />
				</div>
				<div class="item_cart">
					<div class="item_detail">
						<!--						<dt>[[#{data.item.name}]]</dt>-->
						<p class="category_name" th:text="*{categoryName}"></p>
						<h2 class="detail_name" th:text="*{name}"></h2>
						<!--						<dt>[[#{data.item.price}]]</dt>-->
						<div class="price_only">
							<p class="price_tax" th:text="'&yen;'+*{price}"></p>
							<span class="tax">(税込)</span>
						</div>
						<!--						<dt>[[#{data.item.stock}]]</dt>-->
						<!--						<dt>[[#{data.category}]</dt>-->
						<!--						<dt>[[#{data.description}]]</dt>-->
						<div class="rating">
							<span>★★★★★</span><b>4.8</b><a href="#reviews">レビューを見る（36件）</a>
						</div>
						<p class="stock_item" th:if="*{stock > 5}" th:text="#{data.in.stock}"></p>
						<p class="stock_item" th:if="*{stock >= 1 and 5 >= stock }" th:text="*{stock}"></p>
						<p class="stock_item" th:if="*{stock == 0}" th:text="#{data.out.of.stock}"></p>
						<p class="script" th:text="*{description}"></p>
					</div>
					<div class="detail_button">
						<form th:action="@{/client/basket/add}" method="post" class="user_info_form"
							th:if="*{stock > 0}">
							<input type="hidden" th:field="*{id}" />
							<input type="submit" value="カートに入れる" class="send_button_detail" />
							<input type="submit" value="♡　お気に入りに追加" class="send_button_fav_detail" />

						</form>
					</div>
				</div>
			</div>
