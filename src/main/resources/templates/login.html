<!DOCTYPE html>
<html xmlns:th="http://www.thymeleaf.org"
	th:replace="~{common/layout_3block :: layout(~{::title},~{::body/content()})}">

<head>
	<meta charset="UTF-8" />
	<meta name="viewport" content="width=device-width, initial-scale=1.0" />
	<title th:text="#{login}+' | '+ #{shop.title}"> </title>
</head>

<body class="user_login">
	<div class="user_container">
		<h1 th:class="page_title" th:text="#{login}">ログイン・会員登録</h1>



		<div class="a">
			<h2 th:class="page_title_login" th:text="#{login.msg.button}">ログイン</h2>
			<!--			<div class="login_content">-->
			<p th:class="description" th:text="#{msg.login.input}">メールアドレスとパスワードを入力してください。</p>

			<div class="login_form_area_one">
				<h2 class="formSectionTitle"></h2>
				<form th:action="@{/login}" method="post" class="login_form" th:object="${loginForm}">
					<th:block th:if="${#fields.hasErrors()}">
						<div class="error_list">
							<ul>
								<li th:each="err:${#fields.detailedErrors()}" th:text="${err.message}"></li>
							</ul>
							<br />
						</div>
					</th:block>


					<div class="input_login">
						<div class="input_gamen">
							<div class="login_row">
								<label class="label"></label>
								<div class="input_mail">
									<input type="text" th:field="*{email}" placeholder="メールアドレス" />
								</div>
							</div>

							<div class="login_row">
								<label class="label"></label>
								<div class="input_pass">
									<input type="password" th:field="*{password}" placeholder="パスワード" />
								</div>
							</div>
						</div>

						<div class="login_row">
							<div class="label"></div>
							<div class="input">
								<input class="login_botan" type="submit" th:value="#{login.msg.button}" />
							</div>
						</div>
					</div>
			</div>
		</div>
		<div class="new_login_content">

			<div class="login_form_area">
				<h2 class="formSectionTitle">初めてご登録のお客様</h2>
				<div>
					<p th:class="description" th:text="#{msg.new.login.input}">お気に入り登録を使用することができるようになります</p>
					<form th:action="@{/login}" method="post" class="login_form" th:object="${loginForm}">
						<div class="label_newMember"></div>
						<div class="input_newMember">
							<input class="new_login_botan" type="submit" th:value="#{client.regist}" />
						</div>
					</form>
				</div>
			</div>

		</div>

		<!--			</div>-->
		<p class="complete_link">
			<a th:href="@{/}" th:text="#{msg.back.to.top}"></a>
		</p>

</body>

</html>
