<!DOCTYPE html>
<html xmlns:th="http://www.thymeleaf.org" lang="ja">

<head>
    <meta charset="UTF-8" />
    <meta name="viewport" content="width=device-width, initial-scale=1.0" />
    <title th:text="#{login.msg.button}">Login</title>
    <link rel="stylesheet" type="text/css" th:href="@{/css/login.css(v=2026061101)}" />
</head>

<body class="auth-login-page">
    <main class="auth-lunaria" aria-label="ログイン画面">
        <section class="auth-login-card" aria-labelledby="auth-title">
            <p class="auth-kicker">Sign in to continue to your account</p>
            <h1 id="auth-title">Welcome back</h1>

            <form th:action="@{/login}" method="post" class="auth-form" th:object="${loginForm}">
                <th:block th:if="${#fields.hasErrors()}">
                    <div class="auth-error" role="alert">
                        <ul>
                            <li th:each="err : ${#fields.detailedErrors()}" th:text="${err.message}"></li>
                        </ul>
                    </div>
                </th:block>

                <div class="auth-field">
                    <label for="email">EMAIL ADDRESS</label>
                    <input id="email" type="email" th:field="*{email}" placeholder="you@example.com" autocomplete="email" />
                </div>

                <div class="auth-field">
                    <div class="auth-label-row">
                        <label for="password">PASSWORD</label>
                        <span>Forgot password?</span>
                    </div>
                    <input id="password" type="password" th:field="*{password}" placeholder="パスワードを入力してください" autocomplete="current-password" />
                </div>

                <button class="auth-primary-button" type="submit">Login</button>
            </form>

            <div class="auth-divider"><span>OR</span></div>

            <a class="auth-secondary-link" th:href="@{/client/user/regist/input/init}">
                <small>New to CryBaby?</small>
                <strong>CREATE AN ACCOUNT</strong>
                <span aria-hidden="true">›</span>
            </a>
        </section>
    </main>
</body>

</html>
