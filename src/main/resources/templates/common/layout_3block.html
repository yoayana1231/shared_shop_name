<!DOCTYPE html>
<html xmlns:th="http://www.thymeleaf.org" th:fragment="layout(title,body)">

<head>
	<meta charset="UTF-8" />
	<meta name="viewport" content="width=device-width, initial-scale=1.0" />
	<link rel="stylesheet" type="text/css" th:href="@{/css/layoutAdmin.css}" />
	<link rel="stylesheet" type="text/css" th:href="@{/css/stylesheetAdmin.css}" />
	<title th:replace="${title}"></title>
</head>

<body
	th:classappend="${(session.user != null and (session.user.authority == 0 or session.user.authority == 1)) ? 'admin' : 'user' }">
	<!--/* ヘッダー */-->
	<header>
		<div th:replace="~{common/headerAdmin :: layout-header}"></div>
	</header>

	<!--/* メイン */-->
	<article class="container content">
		<div th:replace="${body}"></div>
	</article>

	<!--/* フッター */-->
	<footer>
		<div th:replace="~{common/footer :: layout-footer}"></div>
	</footer>
</body>

</html>
