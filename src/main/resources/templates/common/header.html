<!DOCTYPE html>
<html xmlns:th="http://www.thymeleaf.org">

<head>
	<meta charset="UTF-8" />
</head>

<body>
	<div class="header_one">
		<!--トップ（Cry Baby）-->
		<div th:fragment="layout-header">
			<div class="container">
				<h1><a th:class="site_title" th:href="@{/}" th:text="#{shop.title}"></a></h1>

				<!--検索欄-->
				<div class="header-serch">

					<form class="search-demo-form" th:action="@{/client/item/list/search}">
						<input type="search" placeholder="商品名・カテゴリで探す" name="search">

						<button type="submit">検索</button>
					</form>
				</div>

				<div class="header_light">
					<!--ログイン-->
					<!--一般三郎　さん　|　ログアウト-->
					<div th:if="${session.user != null and session.user.authority == 2}" class="user_info">
						<a th:href="@{/client/user/detail}" th:text="${session.user.name}"></a>さん | <a
							th:href="@{/logout}" th:text="#{logout}"></a>
					</div>


					<div th:if="${session.user != null and (session.user.authority == 0 or session.user.authority == 1)}"
						class="user_info">
						<a th:href="@{/admin/user/detail/{id}(id=${session.user.id})}"
							th:text="${session.user.name}"></a>さん
						<a th:href="@{/logout}" th:text="#{logout}"></a>
					</div>
				</div>
				<!--ログイン・会員登録　|　新規会員登録-->
				<div th:if="${session.user == null}" class="user_info">
					<a th:href="@{/login}" th:text="#{login}"></a> | <a th:href="@{/client/user/regist/input/init}"
						th:text="#{client.regist}"></a>
				</div>

				<!--お気に入り-->
				<div class="user_favorite">
					<a th:href="@{/client/favorite/list}"><img th:src="@{/images/header/favorite.png}"></a>
				</div>


				<!--買い物かご-->
				<div class="user_info">
					<a th:href="@{/client/basket/list}"><img th:src="@{/images/header/shopping_cart.png}"></a>
				</div>
			</div>

			<div class="header_two">
				<!--商品一覧-->
				<div>
					<a class="shop_list" th:href="@{/client/item/list/1}" th:text="#{item}+#{title.list}">商品一覧</a>
				</div>
				

				<div th:each="category: ${categories}">
					<a th:href="@{/client/item/list/category}" th:value="${category.id}" th:text="${category.name}"></a>
				</div>
		
			</div>
			
		</div>
	</div>

</body>

</html>
